<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- arrowheads -->
    <marker id="p2p" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1f6f5c"/>
    </marker>
    <marker id="cloud" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#b0463a"/>
    </marker>
    <marker id="local" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3d6ea5"/>
    </marker>
    <marker id="sig" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a8577"/>
    </marker>
    <marker id="p2pStart" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto">
      <path d="M9,0 L0,4.5 L9,9 Z" fill="#1f6f5c"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#f3efe6"/>

  <!-- ===================== TITLE ===================== -->
  <text x="40" y="46" font-size="21" font-weight="700" fill="#15161a" letter-spacing="0.2">
    Real-Time Control Overlay Architecture
  </text>
  <text x="40" y="68" font-size="13" fill="#6b675d">
    Steady-state control never leaves the peers &#8212; the cloud is reduced to one-shot signaling.
  </text>
  <line x1="40" y1="82" x2="920" y2="82" stroke="#15161a" stroke-width="1.5"/>

  <!-- ===================== SIGNALING (top, de-emphasised) ===================== -->
  <g>
    <rect x="370" y="104" width="220" height="46" rx="4" fill="#efe9dc" stroke="#8a8577" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="480" y="126" font-size="13" font-weight="600" fill="#5a564c" text-anchor="middle">Signaling rendezvous</text>
    <text x="480" y="142" font-size="11" fill="#8a8577" text-anchor="middle">WebSocket &#183; used once per session</text>
  </g>
  <!-- cloud reduced-role tag -->
  <text x="600" y="118" font-size="10.5" fill="#8a8577" font-style="italic">cloud role:</text>
  <text x="600" y="132" font-size="10.5" fill="#8a8577" font-style="italic">O(1) setup +</text>
  <text x="600" y="146" font-size="10.5" fill="#8a8577" font-style="italic">optional fallback</text>

  <!-- ================= REMOTE CONTROLLER (left) ================= -->
  <g>
    <rect x="40" y="250" width="150" height="118" rx="6" fill="#ffffff" stroke="#15161a" stroke-width="1.6"/>
    <text x="115" y="278" font-size="14" font-weight="700" fill="#15161a" text-anchor="middle">Controller</text>
    <text x="115" y="296" font-size="11" fill="#6b675d" text-anchor="middle">phone / PC / app</text>
    <line x1="60" y1="308" x2="170" y2="308" stroke="#e0dacb" stroke-width="1"/>
    <text x="115" y="328" font-size="11.5" fill="#3d6ea5" text-anchor="middle" font-weight="600">local &#183; on home LAN</text>
    <text x="115" y="348" font-size="11.5" fill="#1f6f5c" text-anchor="middle" font-weight="600">remote &#183; different network</text>
  </g>

  <!-- ================= HOME BOUNDARY (right cluster) ================= -->
  <rect x="470" y="180" width="450" height="400" rx="10" fill="none" stroke="#15161a" stroke-width="1.3" stroke-dasharray="2 4"/>
  <text x="486" y="202" font-size="12" font-weight="700" fill="#15161a" letter-spacing="1">HOME / LOCAL NETWORK</text>

  <!-- ================= GATEWAY (center of home) ================= -->
  <g>
    <rect x="510" y="250" width="170" height="150" rx="6" fill="#1f6f5c" stroke="#15161a" stroke-width="1.6"/>
    <text x="595" y="280" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">P2P Gateway</text>
    <text x="595" y="298" font-size="11" fill="#cfe3dc" text-anchor="middle">phone / tablet / SBC</text>
    <line x1="528" y1="310" x2="662" y2="310" stroke="#3f8a75" stroke-width="1"/>
    <text x="595" y="330" font-size="11" fill="#eaf3f0" text-anchor="middle">terminates WebRTC</text>
    <text x="595" y="348" font-size="11" fill="#eaf3f0" text-anchor="middle">+ Matter controller</text>
    <text x="595" y="366" font-size="11" fill="#eaf3f0" text-anchor="middle">routes per device</text>
    <text x="595" y="388" font-size="10" fill="#bcd8ce" text-anchor="middle" font-style="italic">mixed mode</text>
  </g>

  <!-- ================= TERTIARY DEVICES (right) ================= -->
  <!-- Matter device -->
  <g>
    <rect x="748" y="238" width="150" height="70" rx="6" fill="#ffffff" stroke="#3d6ea5" stroke-width="1.6"/>
    <text x="823" y="264" font-size="13" font-weight="700" fill="#15161a" text-anchor="middle">Matter device</text>
    <text x="823" y="282" font-size="10.5" fill="#6b675d" text-anchor="middle">compliant bulb / lock</text>
    <text x="823" y="298" font-size="10.5" fill="#3d6ea5" text-anchor="middle" font-weight="600">native Matter (LAN)</text>
  </g>
  <!-- non-Matter device -->
  <g>
    <rect x="748" y="336" width="150" height="70" rx="6" fill="#ffffff" stroke="#3d6ea5" stroke-width="1.6"/>
    <text x="823" y="362" font-size="13" font-weight="700" fill="#15161a" text-anchor="middle">Non-Matter device</text>
    <text x="823" y="380" font-size="10.5" fill="#6b675d" text-anchor="middle">Tuya / Sonoff / ONVIF</text>
    <text x="823" y="396" font-size="10.5" fill="#3d6ea5" text-anchor="middle" font-weight="600">native LAN API</text>
  </g>

  <!-- ================= CLOUD BROKER (bottom, the detour) ================= -->
  <g>
    <rect x="270" y="500" width="190" height="64" rx="6" fill="#f6ecea" stroke="#b0463a" stroke-width="1.6"/>
    <text x="365" y="527" font-size="14" font-weight="700" fill="#8f2f26" text-anchor="middle">Cloud IoT Broker</text>
    <text x="365" y="545" font-size="10.5" fill="#a9564c" text-anchor="middle">per-message fee &#183; shared queue</text>
    <text x="365" y="558" font-size="10.5" fill="#a9564c" text-anchor="middle">two WAN traversals</text>
  </g>
  <text x="270" y="490" font-size="11" fill="#b0463a" font-weight="600">baseline being replaced</text>

  <!-- ============================================================ -->
  <!-- ============== PATHS ======================================= -->
  <!-- ============================================================ -->

  <!-- signaling links (thin, dashed, grey) -->
  <path d="M150,250 C 250,150 320,132 368,130" fill="none" stroke="#8a8577" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#sig)"/>
  <path d="M592,250 C 585,190 560,150 512,132" fill="none" stroke="#8a8577" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#sig)"/>

  <!-- PRIMARY: direct peer connection controller <-> gateway (the thesis) -->
  <path d="M190,302 L505,320" fill="none" stroke="#1f6f5c" stroke-width="4" marker-end="url(#p2p)" marker-start="url(#p2pStart)"/>
  <rect x="248" y="272" width="200" height="22" rx="11" fill="#1f6f5c"/>
  <text x="348" y="287" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">WebRTC DataChannel &#183; E2E P2P</text>

  <!-- local bridge: gateway -> matter device -->
  <path d="M680,300 L744,278" fill="none" stroke="#3d6ea5" stroke-width="2.4" marker-end="url(#local)"/>
  <!-- local bridge: gateway -> non-matter device -->
  <path d="M680,352 L744,368" fill="none" stroke="#3d6ea5" stroke-width="2.4" marker-end="url(#local)"/>
  <text x="712" y="326" font-size="10" fill="#3d6ea5" text-anchor="middle" font-weight="600">local hop</text>

  <!-- CLOUD detour path: controller -> broker -> back up into home, drawn faint -->
  <path d="M130,368 C 150,460 200,514 268,526" fill="none" stroke="#b0463a" stroke-width="2" stroke-dasharray="7 5" opacity="0.7"/>
  <path d="M460,524 C 620,486 664,446 672,406" fill="none" stroke="#b0463a" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#cloud)" opacity="0.45"/>
  <text x="158" y="454" font-size="10.5" fill="#b0463a" font-weight="600" transform="rotate(56 158 454)">legacy detour</text>

  <!-- ============================================================ -->
  <!-- ============== LEGEND ====================================== -->
  <!-- ============================================================ -->
  <g>
    <text x="40" y="418" font-size="11.5" font-weight="700" fill="#15161a" letter-spacing="1">COMMAND PATHS</text>

    <line x1="40" y1="438" x2="82" y2="438" stroke="#1f6f5c" stroke-width="4"/>
    <text x="92" y="442" font-size="11.5" fill="#15161a">Direct peer &#8212; controller &#8596; gateway (no server in path)</text>

    <line x1="40" y1="460" x2="82" y2="460" stroke="#3d6ea5" stroke-width="2.4"/>
    <text x="92" y="464" font-size="11.5" fill="#15161a">Local bridge &#8212; gateway &#8596; device (LAN / Matter)</text>

    <line x1="40" y1="482" x2="82" y2="482" stroke="#8a8577" stroke-width="1.3" stroke-dasharray="4 3"/>
    <text x="92" y="486" font-size="11.5" fill="#15161a">Signaling &#8212; once per session, then idle</text>

    <line x1="40" y1="504" x2="82" y2="504" stroke="#b0463a" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="92" y="508" font-size="11.5" fill="#15161a">Cloud detour &#8212; the path this overlay removes</text>
  </g>

  <!-- measured result callout (the paper's finding, quietly stated) -->
  <g>
    <rect x="40" y="536" width="215" height="52" rx="5" fill="#ffffff" stroke="#1f6f5c" stroke-width="1.4"/>
    <text x="52" y="556" font-size="11.5" font-weight="700" fill="#1f6f5c">Measured on the direct path</text>
    <text x="52" y="573" font-size="11" fill="#15161a">11&#8211;22 ms median vs 472&#8211;933 ms cloud</text>
    <text x="52" y="585" font-size="10.5" fill="#6b675d">29&#8211;50&#215; faster &#183; zero loss &#183; bounded tail</text>
  </g>
</svg>
