<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IoT Control Experiment — P2P vs Cloud</title>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<style>
  :root { --ink:#15161a; --paper:#f3efe6; --me:#d8492b; --peer:#1f6f5c;
          --cloud:#8e44ad; --mono: ui-monospace,"Cascadia Code",Consolas,monospace; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:var(--mono); background:var(--paper); color:var(--ink);
         display:flex; justify-content:center; padding:14px; }
  .panel { width:100%; max-width:640px; border:1.5px solid var(--ink);
           box-shadow:6px 6px 0 var(--ink); background:var(--paper); }
  header { border-bottom:1.5px solid var(--ink); padding:12px 16px;
           display:flex; justify-content:space-between; align-items:center; gap:8px; }
  h1 { font-size:15px; margin:0; text-transform:uppercase; letter-spacing:.04em; }
  #state { font-size:10px; text-transform:uppercase; padding:3px 8px;
           border:1.5px solid var(--ink); white-space:nowrap; }
  #state.on { background:var(--peer); color:var(--paper); border-color:var(--peer); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 16px; }
  label { display:flex; flex-direction:column; gap:3px; font-size:9px;
          text-transform:uppercase; color:#6b675d; }
  input, select { font-family:var(--mono); font-size:14px; padding:8px;
                  border:1.5px solid var(--ink); background:#fff; width:100%; }
  .btns { display:flex; gap:8px; padding:0 16px 12px; flex-wrap:wrap; }
  button { font-family:var(--mono); font-size:12px; text-transform:uppercase;
           padding:10px 12px; border:1.5px solid var(--ink); cursor:pointer;
           background:var(--ink); color:var(--paper); flex:1; min-width:110px; }
  #runBtn { background:var(--me); border-color:var(--me); }
  button:disabled { opacity:.35; }
  #led { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--ink);
         background:#999; display:inline-block; vertical-align:middle;
         transition:background .05s; }
  #led.on { background:#2ecc71; box-shadow:0 0 8px #2ecc71; }
  #devbox { padding:8px 16px; font-size:12px; display:none; align-items:center; gap:10px; }
  #bar { height:8px; margin:0 16px 8px; border:1.5px solid var(--ink); }
  #fill { height:100%; width:0%; background:var(--me); }
  table { width:calc(100% - 32px); margin:0 16px 10px; border-collapse:collapse;
          font-size:11px; }
  th, td { border:1px solid var(--ink); padding:4px 5px; text-align:right; }
  th { background:var(--ink); color:var(--paper); font-size:9px;
       text-transform:uppercase; }
  td:first-child, th:first-child { text-align:left; }
  #log { border-top:1.5px solid var(--ink); padding:8px 16px 14px;
         max-height:140px; overflow-y:auto; font-size:11px; color:#444; }
</style>
</head>
<body>
<main class="panel">
  <header>
    <h1>IoT Control: P2P vs Cloud</h1>
    <div id="state">offline</div>
  </header>

  <div class="grid">
    <label>Role
      <select id="role">
        <option value="controller">Controller (PC — sends commands)</option>
        <option value="device">IoT Device (Phone — executes)</option>
      </select></label>
    <label>Transport
      <select id="transport">
        <option value="p2p">P2P (WebRTC direct)</option>
        <option value="cloud">Cloud (public MQTT broker)</option>
      </select></label>
    <label id="sigLabel">Signaling (PC's IP)
      <input id="url" value="ws://192.168.1.10:8080" /></label>
    <label>Room / experiment ID
      <input id="room" value="iotexp1" /></label>
    <label>Batch sizes (comma list)
      <input id="batches" value="10,100,1000,2000,5000,10000" /></label>
    <label>Gap between commands (ms)
      <input id="gap" type="number" value="10" /></label>
    <label>Network label
      <input id="network" value="cross-isp" /></label>
    <label>Cloud broker (wss)
      <input id="broker" value="wss://broker.hivemq.com:8884/mqtt" /></label>
    <label>TURN url (optional, for mobile NAT)
      <input id="turnurl" value="" placeholder="turn:global.relay.metered.ca:443" /></label>
    <label>TURN username
      <input id="turnuser" value="" placeholder="from Metered dashboard" /></label>
    <label>TURN password
      <input id="turnpass" value="" placeholder="from Metered dashboard" /></label>
  </div>

  <div id="devbox">Virtual IoT device: <span id="led"></span>
    <span id="devstats">0 commands executed</span></div>

  <div class="btns">
    <button id="connectBtn">Connect</button>
    <button id="runBtn" disabled>Run all batches</button>
    <button id="csvBtn" disabled>Download CSVs</button>
  </div>

  <div id="bar"><div id="fill"></div></div>
  <table id="results"><thead><tr>
    <th>batch</th><th>sent</th><th>recv</th><th>loss%</th>
    <th>med ms</th><th>p95</th><th>p99</th><th>cmd/s</th>
  </tr></thead><tbody></tbody></table>
  <div id="log"></div>

<script>
const $ = (id) => document.getElementById(id);
let pc, chan, ws, mqttClient;
let pending = new Map(), rawRows = [], summaryRows = [];
let batchRecv = 0, devCount = 0, transport = "p2p";
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

function log(t){ const d=document.createElement("div"); d.textContent=t;
  $("log").appendChild(d); $("log").scrollTop=1e9; }
function setState(t,on){ $("state").textContent=t; $("state").className=on?"on":""; }

$("role").onchange = () => {
  $("devbox").style.display = $("role").value === "device" ? "flex" : "none"; };
$("transport").onchange = () => {
  $("sigLabel").style.display = $("transport").value==="p2p" ? "flex" : "none"; };

// ---------- IoT device behavior: "execute" a command ----------
function executeCommand(payload, replyFn) {
  // payload: "seq,ts,cmd"  — simulate actuation: toggle the LED
  const parts = String(payload).split(",");
  $("led").classList.toggle("on");
  devCount++;
  $("devstats").textContent = devCount + " commands executed";
  replyFn(parts[0] + "," + parts[1] + ",ACK");   // acknowledge with same seq
}

// ---------- receive path (controller side) ----------
function onAck(payload) {
  const seq = parseInt(String(payload).split(",")[0]);
  if (pending.has(seq)) {
    const rtt = performance.now() - pending.get(seq);
    pending.delete(seq);
    if (seq >= 0) { rawRows.push([seq, rtt]); batchRecv++; }
  }
}

// =============== CONNECT ===============
$("connectBtn").onclick = () => {
  transport = $("transport").value;
  const role = $("role").value;
  if (transport === "p2p") connectP2P(role);
  else connectCloud(role);
};

// ---------- P2P (WebRTC) ----------
function connectP2P(role) {
  ws = new WebSocket($("url").value.trim());
  ws.onopen = () => { log("signaling connected");
    ws.send(JSON.stringify({type:"join", room:$("room").value.trim()})); };
  ws.onerror = () => log("signaling error — is server.js running? IP right?");
  ws.onmessage = async (e) => {
    const m = JSON.parse(e.data);
    if (m.type === "joined") {
      setupPC(role);
      if (m.initiator) {
        chan = pc.createDataChannel("iot", {ordered:true});
        wireChan(role);
        const o = await pc.createOffer(); await pc.setLocalDescription(o);
        ws.send(JSON.stringify({type:"offer", sdp:o}));
      } else log("waiting for offer…");
    }
    else if (m.type==="offer"){ await pc.setRemoteDescription(m.sdp);
      const a=await pc.createAnswer(); await pc.setLocalDescription(a);
      ws.send(JSON.stringify({type:"answer",sdp:a})); }
    else if (m.type==="answer") await pc.setRemoteDescription(m.sdp);
    else if (m.type==="candidate"){ try{await pc.addIceCandidate(m.candidate);}catch(_){} }
    else if (m.type==="full") log("room full — restart node server.js");
  };
}
function setupPC(role){
  const ice = [{urls:"stun:stun.l.google.com:19302"}];
  const turl = document.getElementById("turnurl").value.trim();
  const tuser = document.getElementById("turnuser").value.trim();
  const tpass = document.getElementById("turnpass").value.trim();
  if (turl && tuser) {
    // add the given URL plus common transport variants for reliability
    const host = turl.replace(/^turns?:/,"").split(":")[0];
    const urls = [turl];
    if (host.includes("metered")) {
      urls.length = 0;
      urls.push(
        "turn:"+host+":80",
        "turn:"+host+":80?transport=tcp",
        "turn:"+host+":443",
        "turns:"+host+":443?transport=tcp"
      );
    }
    ice.push({urls: urls, username: tuser, credential: tpass});
    log("TURN configured ("+urls.length+" url"+(urls.length>1?"s":"")+"): "+host);
  } else if (turl) {
    log("TURN url set but username empty — ignoring TURN");
  }
  pc = new RTCPeerConnection({iceServers: ice});
  pc.onicecandidate = (e)=>{ if(e.candidate)
    ws.send(JSON.stringify({type:"candidate",candidate:e.candidate})); };
  pc.onconnectionstatechange = () => {
    log("p2p connection: " + pc.connectionState);
    setState("p2p " + pc.connectionState, pc.connectionState==="connected");
    if (pc.connectionState==="connected")
      pc.getStats().then(st=>st.forEach(r=>{
        if(r.type==="candidate-pair"&&r.state==="succeeded"&&r.nominated)
          st.forEach(c=>{ if(c.id===r.localCandidateId){
            window.__candType = c.candidateType;
            const kind = (c.candidateType==="relay")
              ? "RELAY (via TURN) — this session counts toward p_nat"
              : "DIRECT ("+c.candidateType+") — true peer-to-peer";
            log("selected path: " + kind);
          }});}));
  };
  pc.ondatachannel = (e)=>{ chan=e.channel; wireChan(role); };
}
function wireChan(role){
  chan.onopen = () => { log("data channel open");
    if (role==="controller") $("runBtn").disabled=false; };
  chan.onmessage = (e) => {
    if (role==="device") executeCommand(e.data, (r)=>chan.send(r));
    else onAck(e.data);
  };
}

// ---------- Cloud (public MQTT broker over WSS) ----------
function connectCloud(role) {
  const room = $("room").value.trim();
  const cmdTopic = "iotlab/"+room+"/cmd", ackTopic = "iotlab/"+room+"/ack";
  log("connecting to broker…");
  mqttClient = mqtt.connect($("broker").value.trim(),
    { clientId: "exp-"+role+"-"+Math.random().toString(16).slice(2,8) });
  mqttClient.on("connect", () => {
    setState("cloud connected", true);
    log("cloud broker connected");
    mqttClient.subscribe(role==="device" ? cmdTopic : ackTopic, {qos:0});
    if (role==="controller") $("runBtn").disabled=false;
  });
  mqttClient.on("message", (topic, payload) => {
    const s = payload.toString();
    if (role==="device") executeCommand(s, (r)=>mqttClient.publish(ackTopic, r, {qos:0}));
    else onAck(s);
  });
  mqttClient.on("error", (e)=>log("broker error: "+e.message));
}

// ---------- send one command over the active transport ----------
async function sendCmd(payload) {
  if (transport==="p2p") {
    // backpressure: don't overflow the DataChannel buffer on big batches
    while (chan.bufferedAmount > 1<<20) await sleep(5);
    chan.send(payload);
  } else {
    mqttClient.publish("iotlab/"+$("room").value.trim()+"/cmd", payload, {qos:0});
  }
}

// =============== BATCH RUNNER ===============
$("runBtn").onclick = async () => {
  $("runBtn").disabled = true;
  const sizes = $("batches").value.split(",").map(s=>parseInt(s.trim())).filter(Boolean);
  const GAP = Math.max(0, parseInt($("gap").value));
  summaryRows = []; rawRows = [];
  $("results").querySelector("tbody").innerHTML = "";

  // warm-up (excluded from stats)
  for (let w=0; w<5; w++){ pending.set(-1-w, performance.now());
    await sendCmd(`${-1-w},0,LED_TOGGLE`); await sleep(50); }
  await sleep(500); pending.clear();

  let globalSeq = 0;
  for (const size of sizes) {
    log(`--- batch ${size} starting ---`);
    batchRecv = 0;
    const batchStartRaw = rawRows.length;
    const t0 = performance.now();
    for (let i=0; i<size; i++) {
      const seq = globalSeq++;
      pending.set(seq, performance.now());
      await sendCmd(`${seq},${Date.now()},LED_TOGGLE`);
      $("fill").style.width = (100*i/size)+"%";
      if (GAP) await sleep(GAP);
    }
    // wait for stragglers: up to 10 s after last send
    const deadline = performance.now() + 10000;
    while (batchRecv < size && performance.now() < deadline) await sleep(100);
    const elapsed = (performance.now() - t0) / 1000;
    const rtts = rawRows.slice(batchStartRaw).map(r=>r[1]).sort((a,b)=>a-b);
    const q = p => rtts.length ? rtts[Math.min(rtts.length-1, Math.floor(p*rtts.length))] : NaN;
    const row = {
      batch: size, sent: size, recv: rtts.length,
      loss: (100*(size-rtts.length)/size),
      med: q(.5), p95: q(.95), p99: q(.99),
      thr: rtts.length/elapsed
    };
    summaryRows.push(row);
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${row.batch}</td><td>${row.sent}</td><td>${row.recv}</td>`+
      `<td>${row.loss.toFixed(1)}</td><td>${row.med.toFixed(1)}</td>`+
      `<td>${row.p95.toFixed(1)}</td><td>${row.p99.toFixed(1)}</td>`+
      `<td>${row.thr.toFixed(0)}</td>`;
    $("results").querySelector("tbody").appendChild(tr);
    log(`batch ${size}: recv=${rtts.length} med=${row.med.toFixed(1)}ms `+
        `p99=${row.p99.toFixed(1)}ms thr=${row.thr.toFixed(0)}/s loss=${row.loss.toFixed(1)}%`);
    pending.clear();
    await sleep(1500);   // settle between batches
  }
  $("fill").style.width="100%";
  $("csvBtn").disabled = false; $("runBtn").disabled = false;
  log("ALL BATCHES DONE — download the CSVs");
};

// =============== CSV EXPORT ===============
$("csvBtn").onclick = () => {
  const net = $("network").value.trim()||"unknown";
  const tr  = transport==="p2p" ? "p2p-browser" : "cloud-mqtt";
  const relayed = (window.__candType === "relay") ? 1 : 0;
  const suffix = (transport==="p2p") ? (relayed ? "_relay" : "_direct") : "";
  // raw per-command
  let raw = "seq,rtt_ms,transport,network,relayed\n";
  for (const [s,t] of rawRows) raw += `${s},${t.toFixed(3)},${tr},${net},${relayed}\n`;
  dl(raw, `raw_${tr}_${net}${suffix}.csv`);
  // per-batch summary
  let sum = "batch,sent,recv,loss_pct,median_ms,p95_ms,p99_ms,throughput_cps,transport,network,relayed\n";
  for (const r of summaryRows)
    sum += `${r.batch},${r.sent},${r.recv},${r.loss.toFixed(2)},${r.med.toFixed(2)},`+
           `${r.p95.toFixed(2)},${r.p99.toFixed(2)},${r.thr.toFixed(1)},${tr},${net},${relayed}\n`;
  dl(sum, `summary_${tr}_${net}${suffix}.csv`);
};
function dl(text, name){ const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([text],{type:"text/csv"}));
  a.download=name; a.click(); }
</script>
</main>
</body>
</html>
